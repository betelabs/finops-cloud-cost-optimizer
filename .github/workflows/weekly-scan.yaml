name: Weekly Automated Cost Scan

on:
  schedule:
    - cron: "0 9 * * MON"   # Every Monday 09:00 UTC
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Run cost scan
        run: python -m cli.main scan --cloud aws --days 7 --output reports/weekly-scan.json

      - name: Generate HTML report
        run: python -m cli.main report --cloud aws --days 7 --output reports/weekly-report.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-cost-report-${{ github.run_id }}
          path: reports/
          retention-days: 90

      - name: Post summary to Slack
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python - <<'PYEOF'
          import json, os, requests
          data = json.load(open("reports/weekly-scan.json"))
          waste  = data.get("total_monthly_waste_usd", 0)
          annual = data.get("total_annual_waste_usd", 0)
          n      = data.get("total_idle_resources", 0)
          requests.post(os.environ["SLACK_WEBHOOK"], json={
              "text": f":money_with_wings: *Weekly FinOps Scan* — Waste: ${waste:,.0f}/mo | Annual savings est: ${annual:,.0f} | Idle resources: {n}"
          })
          PYEOF
